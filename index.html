<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एकीकृत डिजिटल परीक्षा पोर्टल</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            color: #2d3748;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .quiz-container {
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 700px;
            width: 100%;
            position: relative;
        }
        h1 {
            text-align: center;
            color: #2b6cb0;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 25px;
            font-size: 15px;
            font-weight: bold;
        }
        
        /* टाइमर और प्रोग्रेस बार */
        .sticky-header {
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
            padding: 10px 0;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 20px;
            display: none;
        }
        .timer-box {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #dd6b20;
            margin-bottom: 10px;
        }
        .progress-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar {
            background: #2b6cb0;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* छात्र विवरण फॉर्म */
        .student-info {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }
        .student-info h3 {
            margin-top: 0;
            color: #2b6cb0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .info-group {
            display: flex;
            flex-direction: column;
        }
        .info-group label {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4a5568;
        }
        .info-group input, .info-group select {
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        /* प्रश्न ब्लॉक */
        .question-block {
            background: #f8fafc;
            padding: 20px;
            margin-bottom: 18px;
            border-left: 6px solid #2b6cb0;
            border-radius: 6px;
        }
        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .marks-tag {
            float: right;
            font-size: 12px;
            background: #edf2f7;
            padding: 3px 10px;
            border-radius: 12px;
            color: #4a5568;
            font-weight: bold;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-item {
            display: flex;
            align-items: center;
            background: white;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover {
            background: #ebf8ff;
            border-color: #bee3f8;
        }
        .option-item input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.3);
            cursor: pointer;
        }
        .option-item label {
            cursor: pointer;
            font-size: 15px;
            width: 100%;
        }

        /* बटन्स */
        .btn {
            display: block;
            width: 100%;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #start-btn { background: #3182ce; }
        #start-btn:hover { background: #2b6cb0; }
        #submit-btn { background: #2b6cb0; display: none; }
        #submit-btn:hover { background: #2c5282; }
        #print-btn { background: #38a169; display: none; }
        #print-btn:hover { background: #2f855a; }
        
        /* छोटा रिपोर्ट कार्ड डिज़ाइन */
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
        }
        .result.correct-bg { background-color: #f0fff4; border: 2px solid #38a169; }
        .result.needs-improvement-bg { background-color: #fffaf0; border: 2px solid #dd6b20; }
        
        /* सही/गलत समरी टेबल */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 15px;
            background: white;
        }
        .summary-table th, .summary-table td {
            border: 1px solid #cbd5e0;
            padding: 10px;
            text-align: center;
        }
        .summary-table th {
            background: #edf2f7;
            color: #4a5568;
        }
        .status-correct { color: #38a169; font-weight: bold; }
        .status-wrong { color: #e53e3e; font-weight: bold; }

        /* टीचर डैशबोर्ड */
        .dashboard-container {
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 700px;
            width: 100%;
        }
        .dashboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 14px;
        }
        .dashboard-table th, .dashboard-table td {
            border: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }
        .dashboard-table th {
            background: #edf2f7;
            color: #4a5568;
        }
        .clear-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            float: right;
        }

        /* प्रिंट सेटिंग्स */
        @media print {
            body { background: white; padding: 0; }
            .quiz-container { box-shadow: none; max-width: 100%; padding: 0; }
            .btn, .sticky-header, .dashboard-container, .clear-btn, select, #quiz-form { display: none !important; }
            .student-info input { border: none; background: transparent; font-weight: bold; font-size: 16px; padding: 0; color: black !important; }
            .result { border: 1px solid #cbd5e0; background: white !important; }
            .summary-table { background: white; }
        }
    </style>
</head>

        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
    </div>

        <div class="info-grid">
